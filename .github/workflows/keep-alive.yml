name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 10 */2 * *"  # every 2 days at 10am UTC
  workflow_dispatch:         # allows manual trigger from GitHub if needed

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -f https://ernbkfqhpccwgbndksff.supabase.co/rest/v1/ \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
          echo "Pinged Supabase successfully"